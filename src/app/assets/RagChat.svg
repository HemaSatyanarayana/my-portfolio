<svg width="1200" height="1000" viewBox="0 0 1200 1000" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="rc-bg" x1="0" y1="0" x2="1200" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E6FE0"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#7BA8FF"/>
    </linearGradient>
    <radialGradient id="rc-glow" cx="0.15" cy="0.1" r="0.9">
