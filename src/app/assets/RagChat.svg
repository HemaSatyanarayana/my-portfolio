  <circle cx="166" cy="538" r="7" fill="#8B5CF6"/>
  <text x="182" y="544" font-size="15" font-weight="600" fill="#475569">Retrieved 4 chunks · Qdrant</text>
  <rect x="140" y="572" width="640" height="232" rx="18" fill="#F0FBF6" stroke="#CBEBDD" stroke-width="2"/>
  <text x="170" y="612" font-size="20" fill="#0F172A" font-weight="600">Welcome! Here's the quickest path:</text>
  <text x="170" y="650" font-size="18" fill="#334155">1. Create a project from the dashboard</text>
  <text x="170" y="684" font-size="18" fill="#334155">2. Connect your SDK with the API key</text>
  <text x="170" y="718" font-size="18" fill="#334155">3. Define a target audience &amp; design</text>
  <text x="170" y="752" font-size="18" fill="#334155">4. Hit Publish — you're live 🎉</text>
