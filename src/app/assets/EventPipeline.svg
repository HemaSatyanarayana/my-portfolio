<svg width="1200" height="1000" viewBox="0 0 1200 1000" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ep-bg" x1="0" y1="0" x2="1200" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E7C5A"/>
      <stop offset="0.5" stop-color="#12825F"/>
      <stop offset="1" stop-color="#3FB489"/>
    </linearGradient>
    <radialGradient id="ep-glow" cx="0.85" cy="0.12" r="0.95">
      <stop offset="0" stop-color="#F7D9A8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#F7D9A8" stop-opacity="0"/>
    </radialGradient>
    <filter id="ep-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#06311f" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="1000" fill="url(#ep-bg)"/>
